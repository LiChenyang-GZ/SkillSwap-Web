spring.datasource.url=jdbc:tc:postgresql:16-alpine:///skillswap_test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://disabled.test.invalid
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://disabled.test.invalid/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.jws-algorithms=RS256
clerk.secret-key=dummy-test-secret

app.storage.supabase.url=https://disabled.test.invalid
app.storage.supabase.service-role-key=dummy-test-key
app.storage.supabase.bucket=skillswap-test-media

app.storage.azure.blob.connection-string=
app.storage.azure.blob.container=media-test
app.storage.azure.blob.sas-valid-days=0

app.upload.max-image-bytes=10485760
app.memory.edit-lock-seconds=180
