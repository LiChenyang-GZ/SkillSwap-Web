# ===== 本地数据库连接 =====
spring.datasource.url=jdbc:postgresql://localhost:5432/skill_swap_dev?sslmode=disable
spring.datasource.username=postgres
spring.datasource.password=1357943Lcy

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ===== Flyway 配置 =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===== JWT 配置（开发用 HS256）=====
jwt.secret=${JWT_HS256_SECRET:development-secret-key-change-in-production-min-256-bits}
jwt.expiration=86400000

# ===== Spring Security OAuth2 Resource Server =====
spring.security.oauth2.resourceserver.jwt.jws-algorithm=HS256

server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-exception=true

# 显示详细日志
logging.level.club.skillswap=DEBUG
logging.level.org.hibernate.SQL=DEBUG