spring.application.name=skill-swap-backend
# ===== DataSource =====
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0&options=pooler_mode=transaction
spring.datasource.username=postgres.cdrstdkgvfftgnlfiwgp
spring.datasource.password=${DB_PASSWORD}

# ===== JPA/Hibernate（开发期自动建表） =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_batch_fetch_size=30
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
# spring.datasource.hikari.leak-detection-threshold=20000 
# spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false


# === HikariCP Connection Pool Configuration ===
# 设置连接池允许的最大连接数。对于Supabase的免费/开发套餐，设置为1或2通常是最安全的。
spring.datasource.hikari.maximum-pool-size=1

# (可选，但推荐) 设置连接池的最小空闲连接数
spring.datasource.hikari.minimum-idle=0

# ===== Server =====
server.port=${PORT:8080}
# 如需统一前缀可开：server.servlet.context-path=/api/v1

# 禁用 Flyway
spring.flyway.enabled=false

# # ===== JWT（自签发）=====
# app.security.jwt.issuer=skill-swap-club
# app.security.jwt.access-token-ttl-min=15
# app.security.jwt.refresh-token-ttl-days=7
# app.security.jwt.hmac-secret=${JWT_HS256_SECRET}

# # ======== OAuth2 Resource Server Configuration (for Supabase JWT) ========
# Supabase 使用 ECC P-256 非对称加密，需要从 JWKS 端点获取公钥
# 你的 Supabase 项目的 Issuer URI。这是 JWT 的签发者身份标识。
# TODO: 替换为你的 Supabase 项目的 URL 来启用SUPABASE JWT 验证
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://htyowitpdudfoggtusyu.supabase.co/auth/v1
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cdrstdkgvfftgnlfiwgp.supabase.co/auth/v1
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://cdrstdkgvfftgnlfiwgp.supabase.co/auth/v1/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256
# supabase.jwt.secret=${JWT_HS256_SECRET}

# # ==========================
# spring.security.oauth2.resourceserver.jwt.audiences=authenticated
# spring.security.oauth2.resourceserver.jwt.jws-algorithm=HS256
# spring.security.oauth2.resourceserver.jwt.secret=${JWT_HS256_SECRET}

server.error.include-stacktrace=always

logging.level.org.springframework.security=DEBUG