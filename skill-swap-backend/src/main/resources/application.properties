spring.application.name=skill-swap-backend

# ===== 1. Azure PostgreSQL 数据库连接 =====
# 注意：DB_HOST 是你在 Azure 概览页看到的那个 server name
spring.datasource.url=jdbc:postgresql://skillswap-db-server.postgres.database.azure.com:5432/postgres?sslmode=require
spring.datasource.username=dbadmin
spring.datasource.password=${DB_PASSWORD}

# === HikariCP 优化 (Azure 规格比 Supabase 免费版好，可以多开几个连接) ===
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000

# ===== 2. JPA/Hibernate 配置 =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===== 3. OAuth2 / JWT (继续保留 Supabase Auth 验证) =====
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cdrstdkgvfftgnlfiwgp.supabase.co/auth/v1
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://cdrstdkgvfftgnlfiwgp.supabase.co/auth/v1/.well-known/jwks.json
# spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256
# ===== 3. 使用Clerk验证 =====
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CLERK_ISSUER_URI:https://glorious-crab-64.clerk.accounts.dev}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URI:https://glorious-crab-64.clerk.accounts.dev/.well-known/jwks.json}
spring.security.oauth2.resourceserver.jwt.jws-algorithms=RS256
clerk.secret-key=${CLERK_SECRET_KEY:}

# ===== 4. Supabase Storage (继续用它存图片) =====
app.storage.supabase.url=${VITE_SUPABASE_URL:}
app.storage.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
app.storage.supabase.bucket=${SUPABASE_STORAGE_BUCKET:skillswap-media}

# ===== 4b. Azure Blob Storage（Media 图片上传） =====
# 从 Azure Portal -> Storage account -> Access keys -> Connection string 获取
app.storage.azure.blob.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
# 你的容器名（截图里是 media）
app.storage.azure.blob.container=${AZURE_STORAGE_MEDIA_CONTAINER:media}
# 返回带只读 SAS 的 URL，适配容器 Private；容器已设置为 Public（Blob）时建议为 0 返回纯 URL
app.storage.azure.blob.sas-valid-days=${AZURE_STORAGE_SAS_DAYS:0}

# ===== 5. 其他常规配置 =====
server.port=${PORT:8080}
spring.flyway.enabled=false
server.error.include-stacktrace=never
logging.level.org.springframework.security=INFO

# 文件上传限制
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
