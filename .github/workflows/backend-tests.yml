name: Backend Tests

on:
  pull_request:
    paths:
      - 'skill-swap-backend/**'
      - '.github/workflows/backend-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'skill-swap-backend/**'
      - '.github/workflows/backend-tests.yml'

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Gradle test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: skill-swap-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle
          cache-dependency-path: |
            skill-swap-backend/**/*.gradle*
            skill-swap-backend/gradle/wrapper/gradle-wrapper.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run backend tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            skill-swap-backend/build/reports/tests/
            skill-swap-backend/build/test-results/
          retention-days: 7
