name: AI Inline PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-inline-review:
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.comment.body, '/review') &&
      !contains(github.event.comment.body, '/review-summary') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get PR information
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number
            });

            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("base_ref", pr.base.ref);
            core.setOutput("head_sha", pr.head.sha);

      - name: Download PR diff from API
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;

            const diff = await github.request("GET /repos/{owner}/{repo}/pulls/{pull_number}", {
              owner,
              repo,
              pull_number,
              headers: {
                accept: "application/vnd.github.v3.diff"
              }
            });

            fs.writeFileSync("pr.diff", diff.data, "utf8");

      - name: Limit diff size
        env:
          AI_REVIEW_DIFF_LIMIT: ${{ vars.AI_REVIEW_DIFF_LIMIT }}
        run: |
          DIFF_LIMIT="${AI_REVIEW_DIFF_LIMIT:-200000}"
          echo "Using AI review diff limit: ${DIFF_LIMIT} bytes"
          head -c "${DIFF_LIMIT}" pr.diff > pr_limited.diff
          FULL_SIZE=$(wc -c < pr.diff)
          LIMITED_SIZE=$(wc -c < pr_limited.diff)
          TRUNCATED=false
          if [ "${FULL_SIZE}" -gt "${LIMITED_SIZE}" ]; then
            TRUNCATED=true
          fi
          echo "AI_REVIEW_DIFF_LIMIT_EFFECTIVE=${DIFF_LIMIT}" >> "$GITHUB_ENV"
          echo "AI_REVIEW_FULL_DIFF_SIZE=${FULL_SIZE}" >> "$GITHUB_ENV"
          echo "AI_REVIEW_LIMITED_DIFF_SIZE=${LIMITED_SIZE}" >> "$GITHUB_ENV"
          echo "AI_REVIEW_DIFF_TRUNCATED=${TRUNCATED}" >> "$GITHUB_ENV"
          echo "Diff stats: full=${FULL_SIZE}, limited=${LIMITED_SIZE}, truncated=${TRUNCATED}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: AI Inline Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_MODEL: gpt-5.4-mini
          CLAUDE_MODEL: claude-sonnet-4-5
          REVIEW_COMMENT: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.issue.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AI_REVIEW_DIFF_TRUNCATED: ${{ env.AI_REVIEW_DIFF_TRUNCATED }}
          AI_REVIEW_DIFF_LIMIT_EFFECTIVE: ${{ env.AI_REVIEW_DIFF_LIMIT_EFFECTIVE }}
          AI_REVIEW_FULL_DIFF_SIZE: ${{ env.AI_REVIEW_FULL_DIFF_SIZE }}
          AI_REVIEW_LIMITED_DIFF_SIZE: ${{ env.AI_REVIEW_LIMITED_DIFF_SIZE }}
        run: |
          node .github/scripts/ai-review-inline.js
